<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ESP32S3 MODBUS 网关配置</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font:14px/1.5 system-ui,-apple-system,sans-serif;background:#f0f2f5;color:#333;padding:12px}
h1{font-size:18px;text-align:center;margin-bottom:12px;color:#1a1a2e}
form{max-width:480px;margin:0 auto}
fieldset{border:1px solid #d0d5dd;border-radius:8px;padding:10px 12px;margin-bottom:10px;background:#fff}
legend{font-weight:600;font-size:13px;color:#1a1a2e;padding:0 4px}
label{display:block;font-size:12px;color:#555;margin-bottom:2px;margin-top:6px}
input,select{width:100%;padding:6px 8px;border:1px solid #d0d5dd;border-radius:4px;font-size:13px;background:#fff}
input:focus,select:focus{outline:none;border-color:#4361ee;box-shadow:0 0 0 2px rgba(67,97,238,.15)}
.row{display:flex;gap:6px;align-items:flex-end}
.row>div{flex:1}
.row input{width:100%}
.reg-row{display:flex;gap:4px;align-items:center;margin-top:4px}
.reg-row input{flex:1;font-size:12px;padding:4px 6px}
.reg-row button{flex:0 0 auto;padding:4px 8px;font-size:11px;background:#ef4444;color:#fff;border:none;border-radius:4px;cursor:pointer}
#reg_list_container{margin-top:4px}
#add_btn{padding:4px 12px;font-size:12px;background:#4361ee;color:#fff;border:none;border-radius:4px;cursor:pointer;margin-top:4px}
#submit_btn{display:block;width:100%;padding:10px;font-size:15px;font-weight:600;background:#4361ee;color:#fff;border:none;border-radius:8px;cursor:pointer;margin:10px 0}
#submit_btn:hover{background:#3a56d4}
#status{text-align:center;font-size:12px;color:#666;min-height:18px}
#status.ok{color:#16a34a}
#status.err{color:#ef4444}
@media(max-width:380px){body{padding:6px}fieldset{padding:8px 10px}}
</style>
</head>
<body>
<h1>ESP32S3 MODBUS 网关配置</h1>
<form id="cfg_form">
<fieldset>
<legend>设备</legend>
<label>设备名称</label>
<input name="dev_name" maxlength="31" placeholder="esp32s3_modbus">
</fieldset>
<fieldset>
<legend>WiFi (Station)</legend>
<label>WiFi SSID</label>
<input name="wifi_ssid" maxlength="31" placeholder="输入 WiFi 名称">
<label>WiFi 密码</label>
<input name="wifi_pass" type="password" maxlength="63" placeholder="输入 WiFi 密码">
<label style="display:flex;align-items:center;gap:6px;margin-top:6px">
<input name="ap_fallback" type="checkbox" value="1" checked style="width:auto">
STA 失败时回退到 AP 模式
</label>
</fieldset>
<fieldset>
<legend>MQTT Broker</legend>
<label>Broker URI</label>
<input name="mqtt_uri" maxlength="127" placeholder="mqtt://192.168.1.100">
<label>端口</label>
<input name="mqtt_port" type="number" min="1" max="65535" value="1883">
<label>用户名 (可选)</label>
<input name="mqtt_user" maxlength="31" placeholder="留空则匿名">
<label>密码 (可选)</label>
<input name="mqtt_pass" type="password" maxlength="31" placeholder="留空则匿名">
<label>客户端 ID (可选)</label>
<input name="mqtt_client_id" maxlength="63" placeholder="留空则自动生成">
<div class="row" style="margin-top:6px">
<div><label>数据上报主题</label><input name="mqtt_data_t" maxlength="63" value="{dev}/data"></div>
<div><label>反写命令主题</label><input name="mqtt_write_t" maxlength="63" value="{dev}/write"></div>
</div>
<label>状态主题</label>
<input name="mqtt_stat_t" maxlength="63" value="{dev}/status">
</fieldset>
<fieldset>
<legend>MODBUS 参数</legend>
<div class="row">
<div><label>波特率</label><select name="baudrate" style="border:1px solid #d0d5dd;border-radius:4px;font-size:13px;padding:6px 8px;width:100%;background:#fff">
<option value="2400">2400</option><option value="4800">4800</option><option value="9600" selected>9600</option><option value="19200">19200</option><option value="38400">38400</option><option value="57600">57600</option><option value="115200">115200</option>
</select></div>
<div><label>数据位</label><select name="data_bits">
<option value="8" selected>8</option><option value="7">7</option>
</select></div>
<div><label>停止位</label><select name="stop_bits">
<option value="1" selected>1</option><option value="2">2</option>
</select></div>
<div><label>校验位</label><select name="parity">
<option value="0" selected>None</option><option value="1">Odd</option><option value="2">Even</option>
</select></div>
</div>
<label>轮询间隔 (ms)</label>
<input name="poll_intv" type="number" min="100" max="60000" value="5000">
</fieldset>
<fieldset>
<legend>寄存器列表 (slave,fc,start,count)</legend>
<div id="reg_list_container"></div>
<input type="hidden" name="reg_list" id="reg_list_hidden">
<button type="button" id="add_btn" onclick="addRegRow()">+ 添加寄存器组</button>
<small style="color:#888">fc: 3=保持寄存器 4=输入寄存器; 例: 1,3,0,10</small>
</fieldset>
<fieldset>
<legend>串口引脚</legend>
<div class="row">
<div><label>TX GPIO</label><input name="tx_pin" type="number" min="0" max="48" value="17"></div>
<div><label>RX GPIO</label><input name="rx_pin" type="number" min="0" max="48" value="18"></div>
<div><label>DE/RE GPIO</label><input name="de_pin" type="number" min="-1" max="48" value="21"></div>
</div>
<small style="color:#888">DE/RE 设为 -1 表示不启用 RS485 方向控制</small>
</fieldset>
<fieldset>
<legend>自定义参数</legend>
<label>自定义参数 1</label>
<input name="custom1" maxlength="127" placeholder="可选">
<label>自定义参数 2</label>
<input name="custom2" maxlength="127" placeholder="可选">
<label>自定义参数 3</label>
<input name="custom3" maxlength="127" placeholder="可选">
</fieldset>
<button type="submit" id="submit_btn">保存配置</button>
<div id="status"></div>
</form>
<script>
const FC_OPTIONS = {3:'保持寄存器(03)',4:'输入寄存器(04)'};

function loadConfig(){
  fetch('/api/config').then(r=>r.json()).then(cfg=>{
    for(let k in cfg){
      let el=document.querySelector('[name="'+k+'"]');
      if(!el)continue;
      if(k==='ap_fallback'){el.checked=cfg[k]==1;continue}
      if(k==='wifi_pass'||k==='mqtt_pass')continue;
      if(el.tagName==='SELECT')el.value=cfg[k];
      else el.value=cfg[k];
    }
    parseRegList(cfg.reg_list||'');
  }).catch(()=>setStatus('无法加载当前配置','err'));
}

function parseRegList(str){
  document.getElementById('reg_list_container').innerHTML='';
  if(!str)return;
  str.split(';').forEach(function(entry){
    var parts=entry.split(',');
    if(parts.length===4)addRegRow(parts[0],parts[1],parts[2],parts[3]);
  });
}

function addRegRow(slave,fc,start,count){
  var div=document.createElement('div');
  div.className='reg-row';
  div.innerHTML='<input placeholder="从机地址" value="'+(slave||'1')+'" type="number" min="1" max="247">'+
    '<select style="font-size:12px;padding:4px 6px;border:1px solid #d0d5dd;border-radius:4px;flex:1;background:#fff">'+
    '<option value="3"'+(fc==='3'||!fc?' selected':'')+'>保持寄存器(03)</option>'+
    '<option value="4"'+(fc==='4'?' selected':'')+'>输入寄存器(04)</option></select>'+
    '<input placeholder="起始地址" value="'+(start||'0')+'" type="number" min="0" max="65535">'+
    '<input placeholder="数量" value="'+(count||'10')+'" type="number" min="1" max="123">'+
    '<button type="button" onclick="this.parentElement.remove()">✕</button>';
  document.getElementById('reg_list_container').appendChild(div);
}

function buildRegList(){
  var rows=document.querySelectorAll('#reg_list_container .reg-row');
  var list=[];
  rows.forEach(function(row){
    var inputs=row.querySelectorAll('input');
    var sel=row.querySelector('select');
    list.push(inputs[0].value+','+sel.value+','+inputs[1].value+','+inputs[2].value);
  });
  document.getElementById('reg_list_hidden').value=list.join(';');
}

function setStatus(msg,cls){
  var s=document.getElementById('status');
  s.textContent=msg;s.className=cls||'';
}

document.getElementById('cfg_form').addEventListener('submit',function(e){
  e.preventDefault();
  buildRegList();
  var form=this;
  var body=new URLSearchParams(new FormData(form)).toString();
  setStatus('正在保存...','');
  fetch('/save',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:body})
    .then(function(r){return r.json();})
    .then(function(data){
      if(data.status==='ok'){setStatus('✓ 配置已保存, 设备正在重启...','ok')}
      else{setStatus('保存失败: '+JSON.stringify(data),'err')}
    }).catch(function(){setStatus('保存请求失败, 请重试','err')});
});

document.addEventListener('DOMContentLoaded',loadConfig);
</script>
</body>
</html>
